name: Desktop

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write # create the GitHub Release and upload installers

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Go sidecar
        run: ./desktop/scripts/build-sidecar.sh

      - name: Install desktop deps
        working-directory: desktop
        # Resolve deps fresh per runner. The committed lockfile is generated on
        # one platform; reusing it triggers npm's optional-deps bug
        # (npm/cli#4828) where the other OS's native binary
        # (@rollup/rollup-linux-x64-gnu, etc.) is silently skipped. Removing it
        # first is the documented workaround.
        run: |
          rm -f package-lock.json
          npm install --no-audit --no-fund

      - name: Test
        run: |
          go test ./...
          cd desktop && npm test

      - name: Build + package
        working-directory: desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm run build
          npx electron-builder --publish ${{ startsWith(github.ref, 'refs/tags/') && 'always' || 'never' }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dscan-${{ matrix.os }}
          path: |
            desktop/release/*.AppImage
            desktop/release/*.deb
            desktop/release/*.dmg
          if-no-files-found: ignore
