appId: com.gor3a.dscan
productName: dscan
copyright: © 2026 gor3a
# Ad-hoc signs the app + Go sidecar and strips quarantine so a locally-built app
# keeps a stable code identity across launches — avoids the per-launch macOS
# permission re-prompt caused by Gatekeeper App Translocation. Full Developer ID
# signing + notarization is the real fix; see electron/afterPack.cjs.
afterPack: ./electron/afterPack.cjs
directories:
  output: release
files:
  - dist/**
  - dist-electron/**
extraResources:
  - from: resources/dscan
    to: dscan
  # powersched CLI (Schedule tab). Vendored under desktop/vendor/powersched so CI
  # (which only checks out this repo) can bundle it. Re-sync from the source repo
  # with scripts/sync-powersched.sh. Resolved at runtime under resources/powersched.
  - from: vendor/powersched
    to: powersched
mac:
  # Two arch-specific dmgs (Apple Silicon + Intel). Each bundles the same fat
  # (universal) Go sidecar, which runs on either — avoiding a brittle
  # universal-app merge step.
  target:
    - target: dmg
      arch: [arm64, x64]
    # zip alongside dmg so electron-builder emits latest-mac.yml + blockmaps,
    # which electron-updater needs for macOS auto-update (active once signed).
    - target: zip
      arch: [arm64, x64]
  icon: build/icon.icns
  category: public.app-category.utilities
  # No Developer ID yet: electron-builder skips its signing pass (identity: null)
  # and afterPack.cjs applies a stable ad-hoc signature instead. Usage strings
  # give the TCC prompt a rationale and associate the grant with this bundle.
  identity: null
  extendInfo:
    NSDesktopFolderUsageDescription: dscan scans your Desktop folder to find reclaimable files.
    NSDownloadsFolderUsageDescription: dscan scans your Downloads folder to find large, reclaimable files.
    NSDocumentsFolderUsageDescription: dscan scans your Documents folder to find reclaimable files.
dmg:
  artifactName: ${productName}-${version}-${arch}.${ext}
linux:
  target: [AppImage, deb]
  icon: build/icon.png
  category: Utility
  synopsis: Interactive disk scanner & cleaner
  description: >-
    Scan known cache/build locations plus your largest files, grouped by
    category and safety tier. Regenerable caches are hard-deleted, real user
    data is moved to the Trash, and protected data is never selectable.
  maintainer: gor3a <mina.sameh.lameh@gmail.com>
  desktop:
    Name: dscan
    Comment: Interactive disk scanner & cleaner
    Categories: Utility;System;FileTools
publish:
  provider: github
  owner: gor3a
  repo: disk-scan
